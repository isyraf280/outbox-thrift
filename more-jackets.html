<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Jackets - Outbox Thrift</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        /* Specific page background based on design 2 */
        body {
            background: linear-gradient(to bottom, #F6C94F 0%, #EBB644 30%, #9DB0A3 70%, #5D83A6 100%);
            overflow: hidden; /* Prevent full page scroll */
        }
        
        /* Custom scrollbar for webkit to make it look clean */
        .scrollable-grid::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable-grid::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container" style="height: 100vh; max-height: 100vh; display: flex; flex-direction: column; overflow: hidden;">
        <!-- Header -->
        <header style="flex-shrink: 0;">
            <button class="icon-btn rounded" onclick="window.location.href='category.html'">
                <i data-feather="arrow-left"></i>
            </button>
            <button class="icon-btn">
                <i data-feather="shopping-cart"></i>
            </button>
        </header>

        <!-- Page Header -->
        <div class="page-header" style="flex-shrink: 0; margin-bottom: 12px;">
            <h1>MORE JACKETS</h1>
            <h2>PILIHAN GAYA LAINNYA</h2>
        </div>

        <!-- Scrollable Grid Area -->
        <div style="flex: 1; overflow-y: auto; padding-bottom: 20px;" class="scrollable-grid">
            <div class="setup-grid" id="setup-grid" style="margin-bottom: 0;">
                <div class="setup-item">
                    <img src="assets/jacket1.png" alt="Jacket Style 1">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket2.png" alt="Jacket Style 2">
                </div>
                <div class="setup-item">
                    <img src="assets/knitwear.png" alt="Jacket Style 3">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket2.png" alt="Jacket Style 4">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket1.png" alt="Jacket Style 5">
                </div>
                <div class="setup-item">
                    <img src="assets/knitwear.png" alt="Jacket Style 6">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket1.png" alt="Jacket Style 7">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket2.png" alt="Jacket Style 8">
                </div>
                <div class="setup-item">
                    <img src="assets/knitwear.png" alt="Jacket Style 9">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket1.png" alt="Jacket Style 10">
                </div>
                <div class="setup-item">
                    <img src="assets/jacket2.png" alt="Jacket Style 11">
                </div>
                <div class="setup-item">
                    <img src="assets/knitwear.png" alt="Jacket Style 12">
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="setup-footer" style="position: relative; bottom: auto; margin-top: 0; flex-shrink: 0; z-index: 10;">
            <button class="btn-secondary" onclick="window.location.href='category.html'" style="width: 100%; margin-bottom: 0;">KEMBALI</button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
