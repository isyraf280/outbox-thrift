<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pengajuan - Outbox Thrift</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .konfirmasi-container {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .page-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .detail-section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 600;
        }
        .detail-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .price-text {
            font-size: 14px;
            font-weight: 600;
            margin-top: -10px;
            margin-bottom: 30px;
            margin-left: 56px; /* align with text above */
        }
        .terms-box {
            background-color: #E2E2E2;
            border-radius: 24px;
            padding: 30px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .terms-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .terms-list li {
            font-size: 14px;
            font-weight: 500;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }
        .btn-edit, .btn-confirm {
            flex: 1;
            padding: 14px;
            border-radius: 24px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .btn-edit {
            background-color: #E2E2E2;
            color: #333;
        }
        .btn-confirm {
            background-color: #E2E2E2;
            color: #333;
        }
        .btn-edit:hover, .btn-confirm:hover {
            background-color: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="app-container" style="min-height: 100vh; position: relative;">
        <h1 class="page-title">KONFIRMASI PENGAJUAN</h1>

        <div class="konfirmasi-container">
            <div class="detail-section-title">DETAIL BARANG YANG DIA JUKAN</div>

            <div class="details-list">
                <div class="detail-item">
                    <div class="detail-icon">
                        <!-- T-shirt icon using iconify like in index.html -->
                        <img src="https://api.iconify.design/ph:t-shirt-light.svg?color=black" alt="Shirt">
                    </div>
                    <div>MEREK :</div>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">
                        <!-- Ruler icon -->
                        <img src="https://api.iconify.design/ph:ruler-light.svg?color=black" alt="Ruler" style="transform: rotate(-45deg);">
                    </div>
                    <div>UKURAN :</div>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">
                        <!-- Presentation/Chart icon -->
                        <img src="https://api.iconify.design/ph:presentation-chart-light.svg?color=black" alt="Condition">
                    </div>
                    <div>KONDISI :</div>
                </div>
                
                <div class="price-text">
                    HARGA YANG DI AJUKAN :
                </div>
            </div>

            <div class="terms-box">
                <ul class="terms-list">
                    <li>1. Semua detail telah kami terima</li>
                    <li>2. Silahkan periksa kembali di atas</li>
                    <li>3. Pastikan semua informasi benar dan jujur</li>
                </ul>
            </div>

            <div class="action-buttons">
                <button class="btn-edit" onclick="window.location.href='nitip-jual.html'">Kembali dan Edit</button>
                <button class="btn-confirm" onclick="window.location.href='kontak-kami.html'">Konfirmasi & kirim</button>
            </div>
        </div>
    </div>

    <script>
        feather.replace();
    </script>
</body>
</html>
