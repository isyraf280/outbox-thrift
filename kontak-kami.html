<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - Outbox Thrift</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .contact-container {
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 40px;
            margin-top: 40px;
        }
        .instruction-text {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }
        .social-btn {
            background-color: #E2E2E2;
            border-radius: 40px;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .social-icon {
            width: 80px;
            height: 80px;
            margin-top: -40px; /* pull the icon up to break out of the box */
            margin-bottom: 12px;
            background-color: transparent;
        }
        .social-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .social-text {
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="app-container" style="min-height: 100vh; position: relative;">
        <!-- Header with Home button -->
        <header>
            <button class="icon-btn" onclick="window.location.href='index.html'">
                <i data-feather="home"></i>
            </button>
        </header>

        <div class="contact-container">
            <div class="instruction-text">
                SILAHKAN UNTUK MENGAKSES<br>
                KE WHATSAPP ATAU<br>
                INSTAGRAM KAMI DIBAWAH<br>
                UNTUK LEBIH DETAIL PEMESANAN
            </div>

            <div style="width: 100%; margin-top: 20px;">
                <!-- Instagram -->
                <a href="#" class="social-btn">
                    <div class="social-icon">
                        <img src="https://api.iconify.design/skill-icons:instagram.svg" alt="Instagram">
                    </div>
                    <div class="social-text">Outboxthrift.id</div>
                </a>

                <!-- WhatsApp -->
                <a href="#" class="social-btn" style="margin-top: 40px;">
                    <div class="social-icon">
                        <img src="https://api.iconify.design/logos:whatsapp-icon.svg" alt="WhatsApp">
                    </div>
                    <div class="social-text">081********</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        feather.replace();
    </script>
</body>
</html>
