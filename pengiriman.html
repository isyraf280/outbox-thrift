<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamat Pengiriman - Outbox Thrift</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="page-header-alt">
            <button class="back-btn" onclick="window.history.back()">
                <i data-feather="arrow-left"></i>
            </button>
            <h1>ALAMAT PENGIRIMAN</h1>
            <div class="header-icon"></div>
        </div>

        <!-- Form -->
        <form action="pembayaran.html" method="GET" style="flex: 1; display: flex; flex-direction: column;">
            <div class="form-group">
                <label class="form-label">Nama</label>
                <input type="text" class="form-control" placeholder="Nama" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">No. Hp</label>
                <input type="tel" class="form-control" placeholder="No. Hp" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Alamat Lengkap</label>
                <input type="text" class="form-control" placeholder="Alamat Lengkap" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Kota/Kabupaten</label>
                <input type="text" class="form-control" placeholder="" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Kode Pos</label>
                <input type="text" class="form-control" placeholder="" required>
            </div>

            <div style="margin-top: auto; padding-bottom: 20px;">
                <button type="submit" class="btn-primary">LANJUT KE PEMBAYARAN</button>
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
