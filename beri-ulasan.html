<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beri Ulasan - Outbox Thrift</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="app-container" style="display: flex; flex-direction: column; min-height: 100vh;">
        <!-- Header -->
        <div class="page-header-alt" style="margin-bottom: 40px;">
            <button class="back-btn" onclick="window.history.back()">
                <i data-feather="arrow-left"></i>
            </button>
            <h1>BERI ULASAN BARANG</h1>
            <div class="header-icon"></div>
        </div>

        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
            <div style="background: white; border-radius: 20px; padding: 40px 20px; text-align: center; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <i data-feather="star" style="width: 64px; height: 64px; color: var(--primary-yellow); margin-bottom: 20px; fill: var(--primary-yellow);"></i>
                <h2 style="font-size: 20px; margin-bottom: 12px; font-weight: 700;">Halaman Ulasan</h2>
                <p style="color: var(--text-dark); font-size: 14px; margin-bottom: 30px;">Halaman ini sedang dalam pengembangan.<br>Nantikan fitur ulasan kami!</p>
                <a href="selamat-bergabung.html" class="btn-primary">KEMBALI</a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
