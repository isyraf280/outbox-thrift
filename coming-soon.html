<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Outbox Thrift</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="profile-header">
            <button class="icon-btn" onclick="window.location.href='index.html'">
                <i data-feather="home"></i>
            </button>
        </header>

        <div class="coming-soon-page">
            <div class="cs-grid">
                <!-- Item 1 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/knitwear.png" alt="Crewneck">
                    </div>
                    <span>Crewneck</span>
                </div>
                <!-- Item 2 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/jacket1.png" alt="Auter Rajut">
                    </div>
                    <span>Auter Rajut</span>
                </div>
                <!-- Item 3 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/jacket2.png" alt="Cardigan knit">
                    </div>
                    <span>Cardigan knit</span>
                </div>
                <!-- Item 4 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/knitwear.png" alt="Rajut">
                    </div>
                    <span>Rajut</span>
                </div>
                <!-- Item 5 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/jacket1.png" alt="Blue Croppe Jacket">
                    </div>
                    <span>Blue Croppe Jacket</span>
                </div>
                <!-- Item 6 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/jacket2.png" alt="Jacket">
                    </div>
                    <span>Jacket</span>
                </div>
                <!-- Item 7 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/knitwear.png" alt="Jeans">
                    </div>
                    <span>Jeans</span>
                </div>
                <!-- Item 8 -->
                <div class="cs-item">
                    <div class="cs-image">
                        <img src="assets/jacket1.png" alt="Kemeja Slimfit Polos">
                    </div>
                    <span>Kemeja Slimfit Polos</span>
                </div>
            </div>
            
            <button class="coming-soon-btn back-btn" onclick="window.location.href='index.html'">
                KEMBALI KE HALAMAN UTAMA
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        feather.replace();
    </script>
</body>

</html>
